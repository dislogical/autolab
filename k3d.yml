---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: autolab
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 6767:67/udp
    nodeFilters:
      - server:0
files:
  - source: ./k3s.yml
    destination: /etc/rancher/k3s/config.yaml.d/autolab.yaml
    nodeFilters:
      - all
