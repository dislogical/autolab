[settings]
experimental = true
all_compile = false
task.show_full_cmd = true

[plugins]
krew = "https://github.com/soupglasses/mise-krew"

[tools]
# Build tools
sops = "3.13.1"
helmfile = "1.5.5"
helm = "4.2.2"
kustomize = "5.8.1"
kubectl = "1.36.2"
"github:postfinance/topf" = "0.4.1"
# Test Tools
kubeconform = "0.8.0"
kind = "0.32.0"
talosctl = "1.13.4"
tilt = "0.37.4"
# Dev tools
prek = "0.4.5"
flux2 = "2.8.8"
yq = "latest"

# Helpful tools
"krew:ctx" = "v0.11.0"
"krew:ns" = "v0.11.0"
"krew:cert-manager" = "v2.1.0"
"krew:cnpg" = "v1.29.1"

[tasks]
build.run = ["helmfile template -e production > rendered.yaml"]

"lint:helmfile".run = "helmfile lint"
"lint:kubeconform".run = "helmfile template | kubeconform -skip CustomResourceDefinition -schema-location default  -schema-location {{ 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' }}"
"lint".depends = "lint:*"

renovate.run = '''
  docker run --rm \
    --volume .:/usr/src/app \
    --user $UID:$GID \
    -e LOG_LEVEL=debug \
    -e RENOVATE_GITHUB_COM_TOKEN=$(gh auth token) \
    docker.io/renovate/renovate:latest \
      --platform=local
'''

# Testing commands
[task_templates."test:with_cluster_type"]
usage = '''
arg "<cluster-type>"  {
  help "The type of local cluster to run for testing"
  choices "kind" "talos-docker" "talos-qemu"
  default "kind"
}
'''

[tasks."test:setup"]
extends = "test:with_cluster_type"
run = '''
{% if usage.cluster_type == 'kind' %}
  kind create cluster --config kind.yaml
{% elif usage.cluster_type is starting_with('talos-') %}
  {% set talos_type = usage.cluster_type | trim_start_matches(pat='talos-') %}
  talos_version=v$(yq .talosVersion topf.yaml)
  kubernetes_version=v$(yq .kubernetesVersion topf.yaml)

  talosctl cluster create {{ talos_type }} --name talos-{{ talos_type }}-autolab --workers 2 --config-patch-controlplanes @talos/control-plane/01-in-cluster-access.yaml --talos-version ${talos_version} --kubernetes-version ${kubernetes_version}
{% endif %}
'''

[tasks."test:teardown"]
extends = "test:with_cluster_type"
run = '''
{% if usage.cluster_type == "kind" %}
  kind delete cluster --name autolab
{% elif usage.cluster_type is starting_with('talos-') %}
  {% set talos_type = usage.cluster_type | trim_start_matches(pat='talos-') %}

  talosctl cluster destroy --provisioner {{ talos_type }} --name talos-{{ talos_type }}-autolab
{% endif %}
'''

[tasks."test:run"]
extends = "test:with_cluster_type"
run = "tilt ci"

[tasks.test]
extends = "test:with_cluster_type"
run = [
  { task = "test:setup", args = ["{{ usage.cluster_type }}"] },
  { task = "test:run", args = ["{{ usage.cluster_type }}"] },
  { task = "test:teardown", args = ["{{ usage.cluster_type }}"] },
]
