[settings]
experimental = true
all_compile = false

[tools]
# Build tools
helmfile = "1.5.1"
helm = "4.2.0"
kustomize = "5.8.1"
kubectl = "1.36.1"
"github:cozystack/talm" = "0.29.0"
# Test Tools
kind = "0.31.0"
tilt = "0.37.3"
# Dev tools
prek = "0.4.0"
flux2 = "2.8.7"

[tasks]
build.run = [
  "helmfile template -e production > rendered.yaml",
]

test.run = [
  "kind create cluster --config kind.yaml",
  "tilt ci --context kind-autolab",
  "kind delete cluster --name autolab",
]

renovate.run = '''
  docker run --rm \
    --volume .:/usr/src/app \
    --user $UID:$GID \
    -e LOG_LEVEL=debug \
    -e RENOVATE_GITHUB_COM_TOKEN=$(gh auth token) \
    docker.io/renovate/renovate:latest \
      --platform=local
'''
