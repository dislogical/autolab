[settings]
experimental = true
all_compile = false

[env]
PRE_COMMIT_HOME = "{{ env.MISE_DATA_DIR | default(value=xdg_data_home ~ '/mise') }}/pre-commit-hooks"

[tools]
# Build tools
"ubi:cue-lang/cue" = "0.16.1"
task = "3.45.5"
helm = "4.1.4"
kustomize = "5.8.1"
kubeconform = "0.7.0"
# Developer tools
github-cli = "2.91.0"
kind = "0.31.0"
tilt = "0.37.2"
"pipx:pre-commit" = "4.6.0"
"pipx:commitizen" = "4.13.10"
flux2 = "2.8.6"

[tasks]
build.run = "cue cmd build"

test.run = [
  "kind create cluster --config kind.yaml",
  "tilt ci --context kind-autolab",
  "kind delete cluster --name autolab",
]

renovate.run = '''
  docker run --rm \
    --volume .:/usr/src/app \
    --user $UID:$GID \
    -e LOG_LEVEL=debug \
    -e RENOVATE_GITHUB_COM_TOKEN=$(gh auth token) \
    docker.io/renovate/renovate:latest \
      --platform=local
'''

[hooks]
postinstall = [
  "gh extension install nektos/gh-act",
  "gh extension install seachicken/gh-poi",
]
