---
apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
  labels:
    {{- include "platform.labels" . | nindent 4 }}

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  hostnames:
    - services.{{ .Values.externalUrl }}
  parentRefs:
    - kind: Gateway
      name: traefik-gateway
      namespace: gateway
  rules:
    - backendRefs:
        - kind: Service
          name: headlamp
          port: 80

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  {{- include "platform.fluxDefaults" . | nindent 2 }}
  url: https://kubernetes-sigs.github.io/headlamp

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  {{- include "platform.helmReleaseDefaults" . | nindent 2 }}
  chart:
    spec:
      chart: headlamp
      version: 0.42.0
      sourceRef:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    config:
      watchPlugins: true
      extraArgs:
        - -otlp-endpoint=''
    pluginsManager:
      enabled: true
      configContent: |
        installOptions:
          parallel: true
          maxConcurrent: 2
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.6.0
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
          - name: kompose
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_kompose
            version: 0.1.1-beta-1
