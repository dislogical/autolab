---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    {{- include "platform.labels" . | nindent 4 }}

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cert-manager
  namespace: cert-manager
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  {{- include "platform.fluxDefaults" . | nindent 2 }}
  url: https://charts.jetstack.io

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  {{- include "platform.helmReleaseDefaults" . | nindent 2 }}
  chart:
    spec:
      chart: cert-manager
      version: v1.20.2
      sourceRef:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: HelmRepository
        name: cert-manager
        namespace: cert-manager
  values:
    crds:
      enabled: false
    global:
      leaderElection:
        namespace: cert-manager
    config:
      featureGates:
        ServerSideApply: true
    prometheus:
      servicemonitor:
        enabled: true

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: self-signed
  namespace: cert-manager
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: acme-staging
  namespace: cert-manager
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  acme:
    privateKeySecretRef:
      name: acme-staging-account-key
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              key: api-token
              name: cloudflare-api-token

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: acme-prod
  namespace: cert-manager
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  acme:
    privateKeySecretRef:
      name: acme-prod-account-key
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              key: api-token
              name: cloudflare-api-token
