---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    {{- include "platform.labels" . | nindent 4 }}

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: kube-prometheus
  namespace: monitoring
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  {{- include "platform.fluxDefaults" . | nindent 2 }}
  ref:
    tag: v0.17.0
  url: https://github.com/prometheus-operator/kube-prometheus

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-crds
  namespace: monitoring
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  {{- include "platform.fluxDefaults" . | nindent 2 }}
  path: manifests/setup
  prune: true
  sourceRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    name: kube-prometheus
    namespace: monitoring

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus
  namespace: monitoring
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  {{- include "platform.fluxDefaults" . | nindent 2 }}
  dependsOn:
    - name: kube-prometheus-crds
  path: manifests
  prune: true
  sourceRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    name: kube-prometheus
    namespace: monitoring
