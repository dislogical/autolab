clusterName: ballard-prod

# REQUIRED. Cluster control-plane endpoint. Left empty intentionally
# so the chart's `required` check fires loudly on a fresh install.
# A placeholder default would silently embed a broken endpoint in
# every rendered machine config. No auto-discovery is possible: this
# is a cluster-wide value that every node's kubelet and kube-proxy
# dials, not a per-node one. For single-node clusters set it to that
# node's routable IP; for multi-node set it to a VIP or external LB.
# Example: endpoint: "https://192.168.0.1:6443"
endpoint: "https://kube-prod.ballard.dislogi.net:6443"

# Layer-2 VIP for multi-node setups. When set, the chart emits a
# Layer2VIPConfig document pinning this IP as a floating address on
# the node's primary link. MUST equal the host portion of `endpoint`
# above, otherwise the cluster dials an IP that no node actually
# claims. Blank by default so the shipped value never silently embeds
# a wrong VIP — fill in only if you want a VIP. Single-node clusters
# and external-LB topologies leave it blank.
# Example: floatingIP: 192.168.0.1
#floatingIP: "10.0.1.2"

# Optional override for the link Layer2VIPConfig is pinned to. When
# left empty the chart picks the default-gateway-bearing link the
# node already has (the VLAN sub-interface if one carries the
# default route, otherwise the physical NIC). Set this when the
# target link does not yet exist on the live system at first apply
# — typically a VLAN sub-interface that the same template is about
# to bring up. Without an override the chart would derive the link
# from discovery on the bare-metal NIC, pin the VIP there, and the
# VIP would land on the wrong link once the VLAN comes up.
# When set, Layer2VIPConfig is emitted unconditionally, even on a
# totally fresh node where discovery has not yet resolved a default-
# gateway link. The chart does NOT auto-emit a LinkConfig/VLANConfig
# for the override link; the operator is responsible for ensuring
# the link comes up — typically by adding a LinkConfig or VLANConfig
# document for that link to the per-node body overlay. If no such
# document brings vipLink up, Layer2VIPConfig will dangle on a
# non-existent link and the cluster endpoint will be unreachable.
# Example: vipLink: eth0.4000
#vipLink: ""

podSubnets:
  - 10.244.0.0/16
serviceSubnets:
  - 10.96.0.0/12

# Optional override for machine.kubelet.nodeIP.validSubnets and
# cluster.etcd.advertisedSubnets. When left empty the chart derives
# the value from the node's default-gateway-bearing link at render
# time (via talm.discovered.default_addresses_by_gateway), so the
# generated machine config matches the node's actual network without
# any values.yaml edit. Set this only when you want to pin a specific
# subnet — typically for multi-homed nodes where the default-gateway
# link is not the subnet you want kubelet/etcd to use.
# Example:
#   advertisedSubnets:
#     - "10.0.0.0/8"
advertisedSubnets:
  - "10.0.1.0/24"

certSANs: []
