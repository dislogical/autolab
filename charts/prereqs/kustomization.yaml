apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/standard-install.yaml
  - lb-namespace.yaml
  - monitoring-namespace.yaml
    # TODO: REMOVE this when CNPG 1.30.0 releases the helm chart
  - https://github.com/cloudnative-pg/cloudnative-pg/releases/download/v1.30.0-rc1/cnpg-1.30.0-rc1.yaml

transformers:
  - |-
    apiVersion: builtin
    kind: NamespaceTransformer
    metadata:
      name: not-important-to-example
      namespace: default
    unsetOnly: true
    fieldSpecs: []
